[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Filtro para ver el Serial Plotter correctamente si es necesario
monitor_filters = esp32_exception_decoder

lib_deps =
    # Librería para el Ejercicio 1 (Reproducción AAC/MP3)
    earlephilhower/ESP8266Audio @ ^1.9.7
    
    # Librería para el Ejercicio 2 (SD y procesamiento de audio I2S)
    esphome/ESP32-audioI2S @ ^2.0.7